<h3>Artículos en esta orden</h3>
    <table border="1" style="width: 100%; border-collapse: collapse;">
        <thead style="background-color: #eee;">
            <tr>
                <th>Artículo</th>
                <th>Cantidad</th>
                <th>Precio Unit.</th>
                <th>Subtotal</th> </tr>
        </thead>
        <tbody>
            {% for detalle in orden.detalles.all %}
            <tr>
                <td>{{ detalle.articulo.nombre }}</td>
                <td style="text-align: center;">{{ detalle.cantidad }}</td>
                <td style="text-align: right;">{{ detalle.precio_unitario_historico }}€</td>
                <td style="text-align: right; font-weight: bold;">
                    {{ detalle.subtotal }}€ </td>
            </tr>
            {% endfor %}
        </tbody>
        <tfoot>
            <tr style="background-color: #f0f0f0;">
                <td colspan="3" style="text-align: right; font-weight: bold; padding: 10px;">TOTAL ORDEN:</td>
                <td style="text-align: right; font-weight: bold; color: #d32f2f; padding: 10px;">
                    {{ orden.total_orden }}€ </td>
            </tr>
        </tfoot>
    </table>
