<!-- compras/templates/compras/confirmar_borrado.html -->

<div style="max-width: 500px; margin: 50px auto; font-family: sans-serif; border: 1px solid #ddd; padding: 20px; border-radius: 8px; text-align: center;">
    <h2 style="color: #dc3545;">⚠️ Confirmar Eliminación</h2>
    
    <p>¿Estás seguro de que deseas eliminar permanentemente:</p>
    <p><strong>"{{ objeto }}"</strong>?</p> <!-- Aquí saldrá el nombre del artículo o proveedor -->

    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        
        <button type="submit" style="padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            Sí, eliminar definitivamente
        </button>
        
        <div style="margin-top: 15px;">
            <a href="javascript:history.back()" style="color: #666; text-decoration: none; font-size: 0.9em;">
                Cancelar y volver atrás
            </a>
        </div>
    </form>
</div>
