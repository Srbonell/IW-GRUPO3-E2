<div style="max-width: 600px; margin: 20px auto; font-family: sans-serif;">
    <h1>{% if editando %}Editar Orden #{{ form.instance.pk }}{% else %}Nueva Orden de Compra{% endif %}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top: 20px;">
            <button type="submit" style="background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
                {% if editando %}Actualizar Orden{% else %}Generar Orden{% endif %}
            </button>
            <a href="{% url 'compras:listado_ordenes' %}" style="margin-left: 15px; color: #666; text-decoration: none;">Cancelar</a>
        </div>
    </form>
</div>
