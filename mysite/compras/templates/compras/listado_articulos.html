<style>
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        font-family: sans-serif;
    }

    th,
    td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
    }

    th {
        background-color: #f4f4f4;
        color: #333;
    }

    tr:nth-child(even) {
        background-color: #f9f9f9;
    }

    .btn-nuevo {
        display: inline-block;
        padding: 10px;
        background: #28a745;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
    }

    .btn-editar {
        padding: 6px 10px;
        background: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 3px;
        font-size: 0.85em;
        margin-right: 5px;
    }

    .btn-borrar {
        padding: 6px 10px;
        background: #dc3545;
        color: white;
        text-decoration: none;
        border-radius: 3px;
        font-size: 0.85em;
    }

    .btn-volver {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 15px;
        background-color: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }
</style>

<h1>Listado de Artículos</h1>

<div style="margin-bottom: 20px;">
    <a href="{% url 'compras:crear_articulo' %}" class="btn-nuevo">
        + Nuevo Artículo
    </a>
</div>

<table>
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio Actual</th>
            <th style="text-align: center;">Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for a in articulos %}
        <tr>
            <td>{{ a.nombre }}</td>
            <td>{{ a.descripcion }}</td>
            <td>{{ a.precio_estimado }}€</td>

            <td style="text-align: center; white-space: nowrap; min-width: 150px;">
                <a href="{% url 'compras:editar_articulo' a.pk %}" class="btn-editar">
                    ✏️ Editar
                </a>
                <a href="{% url 'compras:eliminar_articulo' a.pk %}" class="btn-borrar">
                    🗑️ Eliminar
                </a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" style="text-align: center;">No hay artículos registrados.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="{% url 'compras:inicio' %}" class="btn-volver">← Volver al inicio</a>
